<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budget">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>💰 Budget</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:#0f172a;color:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:env(safe-area-inset-bottom,20px);}

  /* HEADER */
  .header{padding:calc(env(safe-area-inset-top,0px) + 16px) 16px 0;display:flex;align-items:center;justify-content:space-between;}
  .header h1{font-size:1.2rem;font-weight:700;letter-spacing:.5px;}
  .history-btn{background:#1e293b;border:none;color:#94a3b8;padding:8px 14px;border-radius:20px;font-size:.8rem;cursor:pointer;}

  /* TIPO TOGGLE */
  .tipo-wrap{padding:16px 16px 0;}
  .tabs{display:flex;background:#1e293b;border-radius:14px;padding:4px;gap:4px;}
  .tab{flex:1;padding:11px;text-align:center;border-radius:10px;cursor:pointer;font-size:.95rem;font-weight:700;transition:all .2s;color:#64748b;border:none;background:transparent;}
  .tab.uscita.active{background:#e94560;color:#fff;}
  .tab.entrata.active{background:#22c55e;color:#fff;}

  /* IMPORTO */
  .importo-section{padding:20px 16px 0;text-align:center;}
  .importo-display{font-size:3.4rem;font-weight:800;letter-spacing:-1px;min-height:60px;line-height:1;transition:color .2s;}
  .importo-display.uscita{color:#e94560;}
  .importo-display.entrata{color:#22c55e;}
  .importo-hint{font-size:.72rem;color:#475569;margin-top:6px;}

  /* TASTIERINO */
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px 16px 0;}
  .key{background:#1e293b;border:none;color:#f1f5f9;border-radius:14px;padding:18px 8px;font-size:1.5rem;font-weight:600;cursor:pointer;transition:background .1s;user-select:none;}
  .key:active{background:#334155;}
  .key.del{color:#94a3b8;font-size:1.2rem;}
  .key.dot{color:#94a3b8;}

  /* SEZIONI */
  .section{padding:20px 16px 0;}
  .section-label{font-size:.7rem;color:#64748b;letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;}

  /* CATEGORIE */
  .cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
  .cat-btn{background:#1e293b;border:2px solid transparent;border-radius:12px;padding:13px 10px;text-align:left;cursor:pointer;transition:all .15s;color:#f1f5f9;display:flex;align-items:center;gap:8px;font-size:.83rem;font-weight:500;line-height:1.2;}
  .cat-btn:active{background:#334155;}
  .cat-btn.selected.uscita{border-color:#e94560;background:#e9456018;}
  .cat-btn.selected.entrata{border-color:#22c55e;background:#22c55e18;}
  .cat-emoji{font-size:1.25rem;flex-shrink:0;}

  /* DESCRIZIONE */
  .desc-input{width:100%;background:#1e293b;color:#f1f5f9;border:1.5px solid #334155;border-radius:12px;padding:14px;font-size:1rem;outline:none;-webkit-appearance:none;transition:border .2s;}
  .desc-input:focus{border-color:#e94560;}
  .desc-input.entrata:focus{border-color:#22c55e;}

  /* DATA */
  .data-input{width:100%;background:#1e293b;color:#f1f5f9;border:1.5px solid #334155;border-radius:12px;padding:13px 14px;font-size:.95rem;outline:none;-webkit-appearance:none;}

  /* SALVA */
  .salva-wrap{padding:20px 16px 0;}
  .salva{width:100%;padding:18px;background:#e94560;color:#fff;border:none;border-radius:14px;font-size:1.1rem;font-weight:800;letter-spacing:.5px;cursor:pointer;transition:opacity .15s;}
  .salva:active{opacity:.8;}
  .salva:disabled{opacity:.4;cursor:not-allowed;}
  .salva.entrata{background:#22c55e;}

  /* TOAST */
  .toast{display:none;position:fixed;top:calc(env(safe-area-inset-top,0px) + 16px);left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:13px 28px;border-radius:30px;font-weight:700;font-size:.95rem;z-index:999;box-shadow:0 4px 24px rgba(0,0,0,.5);white-space:nowrap;}
  .toast.error{background:#e94560;}

  /* HISTORY PANEL */
  .history-panel{display:none;position:fixed;inset:0;background:#0f172a;z-index:100;overflow-y:auto;padding:calc(env(safe-area-inset-top,0px) + 16px) 16px 40px;}
  .history-panel.open{display:block;}
  .history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .history-header h2{font-size:1.1rem;font-weight:700;}
  .close-btn{background:#1e293b;border:none;color:#94a3b8;padding:8px 14px;border-radius:20px;font-size:.85rem;cursor:pointer;}
  .entry{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid #1e293b;gap:10px;}
  .entry:last-child{border-bottom:none;}
  .entry-left{flex:1;min-width:0;}
  .entry-desc{font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .entry-cat{font-size:.72rem;color:#64748b;margin-top:2px;}
  .entry-date{font-size:.7rem;color:#475569;margin-top:1px;}
  .entry-amount{font-size:1rem;font-weight:800;flex-shrink:0;}
  .entry-amount.uscita{color:#e94560;}
  .entry-amount.entrata{color:#22c55e;}
  .empty{text-align:center;color:#334155;padding:40px 0;font-size:.9rem;}

  /* SPINNER */
  .spinner{display:inline-block;width:18px;height:18px;border:2px solid #ffffff44;border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="header">
  <h1>💰 Budget 2026</h1>
  <button class="history-btn" onclick="apriHistory()">Storico</button>
</div>

<div class="tipo-wrap">
  <div class="tabs">
    <button class="tab uscita active" id="tab-uscita" onclick="setTipo('Uscita')">📤 Uscita</button>
    <button class="tab entrata" id="tab-entrata" onclick="setTipo('Entrata')">📥 Entrata</button>
  </div>
</div>

<div class="importo-section">
  <div class="importo-display uscita" id="importo-display">€ 0</div>
  <div class="importo-hint">Tocca i tasti per inserire l'importo</div>
</div>

<div class="keypad">
  <button class="key" onclick="pressKey('1')">1</button>
  <button class="key" onclick="pressKey('2')">2</button>
  <button class="key" onclick="pressKey('3')">3</button>
  <button class="key" onclick="pressKey('4')">4</button>
  <button class="key" onclick="pressKey('5')">5</button>
  <button class="key" onclick="pressKey('6')">6</button>
  <button class="key" onclick="pressKey('7')">7</button>
  <button class="key" onclick="pressKey('8')">8</button>
  <button class="key" onclick="pressKey('9')">9</button>
  <button class="key dot" onclick="pressKey('.')">·</button>
  <button class="key" onclick="pressKey('0')">0</button>
  <button class="key del" onclick="pressKey('del')">⌫</button>
</div>

<div class="section">
  <div class="section-label">Categoria</div>
  <div class="cat-grid" id="cat-grid"></div>
</div>

<div class="section">
  <div class="section-label">Descrizione</div>
  <input class="desc-input" id="descrizione" type="text" placeholder="es. Cena da Niko Romito…" autocomplete="off">
</div>

<div class="section">
  <div class="section-label">Data</div>
  <input class="data-input" id="data" type="date">
</div>

<div class="salva-wrap">
  <button class="salva" id="salva-btn" onclick="invia()">Salva</button>
</div>

<!-- Iframe nascosto per scrivere su Apps Script senza CORS -->
<iframe id="gs-iframe" name="gs-iframe" style="display:none;width:0;height:0;border:0;" aria-hidden="true"></iframe>

<!-- HISTORY -->
<div class="history-panel" id="history-panel">
  <div class="history-header">
    <h2>Ultime voci</h2>
    <button class="close-btn" onclick="chiudiHistory()">✕ Chiudi</button>
  </div>
  <div id="history-list"><div class="empty">Caricamento…</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ⚠️ Sostituisci con il tuo URL dopo il deploy di Apps Script
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzWhNXPnxtQS5Hlx5CpsrSCQ_dpx4mmTfTnVQLBNVmLKR3_e7W5wRzyOI_KiHibMA7c/exec';

const USCITE = [
  "Personali (vestiti, unghie, altro)",
  "Abbonamenti Vari",
  "Trasporti, Autostr, parcheg.",
  "Bollette",
  "Gasolio/benzina",
  "Manut. auto",
  "Mutuo",
  "Regali",
  "Ristorante/Ape/Merende",
  "Spesa alimentare",
  "Spese Mediche",
  "Spese pupino",
  "Spese Sport",
  "Varie generiche",
  "Viaggi, Vacanze",
  "Noleggio Auto",
  "Azioni per Vittoria FTSE ALL WORLD",
  "Spese Extra"
];

const ENTRATE = [
  "Stipendio Simo",
  "Varie Simo",
  "Stipendio Francy",
  "Fotovoltaico",
  "Regali",
  "Altri",
  "Entrate Extra"
];

const EMOJI_USCITE = {
  "Personali (vestiti, unghie, altro)":"👗",
  "Abbonamenti Vari":"📱",
  "Trasporti, Autostr, parcheg.":"🚗",
  "Bollette":"💡",
  "Gasolio/benzina":"⛽",
  "Manut. auto":"🔧",
  "Mutuo":"🏠",
  "Regali":"🎁",
  "Ristorante/Ape/Merende":"🍽️",
  "Spesa alimentare":"🛒",
  "Spese Mediche":"🏥",
  "Spese pupino":"👶",
  "Spese Sport":"🏃",
  "Varie generiche":"📦",
  "Viaggi, Vacanze":"✈️",
  "Noleggio Auto":"🚙",
  "Azioni per Vittoria FTSE ALL WORLD":"📈",
  "Spese Extra":"💸"
};

const EMOJI_ENTRATE = {
  "Stipendio Simo":"💼",
  "Varie Simo":"💰",
  "Stipendio Francy":"💼",
  "Fotovoltaico":"☀️",
  "Regali":"🎁",
  "Altri":"➕",
  "Entrate Extra":"🎉"
};

let tipoCorrente = 'Uscita';
let importoStr = '';
let categoriaSelezionata = '';

// Data default = oggi
document.getElementById('data').value = new Date().toISOString().split('T')[0];

function setTipo(tipo) {
  tipoCorrente = tipo;
  categoriaSelezionata = '';
  ['uscita','entrata'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t === tipo.toLowerCase());
  });
  document.getElementById('importo-display').className = 'importo-display ' + tipo.toLowerCase();
  document.getElementById('descrizione').className = 'desc-input ' + tipo.toLowerCase();
  document.getElementById('salva-btn').className = 'salva ' + tipo.toLowerCase();
  renderCategorie();
  aggiornaDisplay();
}

function renderCategorie() {
  const grid = document.getElementById('cat-grid');
  const list  = tipoCorrente === 'Uscita' ? USCITE : ENTRATE;
  const emoji = tipoCorrente === 'Uscita' ? EMOJI_USCITE : EMOJI_ENTRATE;
  grid.innerHTML = list.map(c => `
    <button class="cat-btn ${c===categoriaSelezionata?'selected '+tipoCorrente.toLowerCase():''}"
            onclick="selezionaCategoria(this,'${c.replace(/'/g,"\\'")}')">
      <span class="cat-emoji">${emoji[c]||'•'}</span>
      <span>${c}</span>
    </button>`).join('');
}

function selezionaCategoria(btn, cat) {
  categoriaSelezionata = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.className='cat-btn');
  btn.className = 'cat-btn selected ' + tipoCorrente.toLowerCase();
}

function pressKey(k) {
  if (k === 'del') {
    importoStr = importoStr.slice(0,-1);
  } else if (k === '.') {
    if (!importoStr.includes('.')) importoStr += '.';
  } else {
    const parts = importoStr.split('.');
    if (parts.length===2 && parts[1].length>=2) return;
    if (importoStr==='0') importoStr=k;
    else importoStr+=k;
  }
  aggiornaDisplay();
}

function aggiornaDisplay() {
  document.getElementById('importo-display').textContent = '€ ' + (importoStr||'0');
}

async function invia() {
  const importo = parseFloat(importoStr);
  if (!importoStr || importo<=0) return mostraToast('Inserisci un importo', true);
  if (!categoriaSelezionata)     return mostraToast('Seleziona una categoria', true);
  const descrizione = document.getElementById('descrizione').value.trim();
  if (!descrizione) return mostraToast('Inserisci una descrizione', true);

  const dataVal = document.getElementById('data').value;
  const [y,m,d] = dataVal.split('-');
  const dataIT = `${d}/${m}/${y}`;

  const btn = document.getElementById('salva-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Salvataggio…';

  try {
    const payload = encodeURIComponent(JSON.stringify({data:dataIT, descrizione, importo, categoria:categoriaSelezionata, tipo:tipoCorrente}));
    // Usiamo l'iframe invece di fetch: naviga verso Apps Script come Safari, senza blocchi CORS
    document.getElementById('gs-iframe').src = `${SCRIPT_URL}?action=write&data=${payload}`;
    // Aspettiamo 1.8s (il tempo che Apps Script processi la richiesta)
    await new Promise(r => setTimeout(r, 1800));
    mostraToast('✅ Salvato!');
    importoStr = '';
    categoriaSelezionata = '';
    document.getElementById('descrizione').value = '';
    aggiornaDisplay();
    renderCategorie();
  } catch(e) {
    mostraToast('Errore di connessione', true);
  }

  btn.disabled = false;
  btn.textContent = 'Salva';
  btn.className = 'salva ' + tipoCorrente.toLowerCase();
}

async function apriHistory() {
  document.getElementById('history-panel').classList.add('open');
  try {
    const r = await fetch(SCRIPT_URL);
    const entries = await r.json();
    const list = document.getElementById('history-list');
    if (!entries.length) { list.innerHTML='<div class="empty">Nessuna voce ancora</div>'; return; }
    list.innerHTML = entries.map(e=>`
      <div class="entry">
        <div class="entry-left">
          <div class="entry-desc">${e.descrizione||''}</div>
          <div class="entry-cat">${e.categoria||''}</div>
          <div class="entry-date">${e.data||''}</div>
        </div>
        <div class="entry-amount ${(e.tipo||'').toLowerCase()}">${e.tipo==='Entrata'?'+':'-'}€${parseFloat(e.importo||0).toFixed(2)}</div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('history-list').innerHTML='<div class="empty">Impossibile caricare</div>';
  }
}

function chiudiHistory() {
  document.getElementById('history-panel').classList.remove('open');
}

function mostraToast(msg, errore=false) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(errore?' error':'');
  t.style.display='block';
  setTimeout(()=>t.style.display='none', 2500);
}

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

renderCategorie();
</script>
</body>
</html>
